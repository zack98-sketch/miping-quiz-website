version: '3.8'

services:
  backend:
    build: ./backend
    container_name: quiz-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./5075道题密评题库+答案解析.xlsx:/app/data/questions.xlsx:ro
    environment:
      - DATABASE_URL=sqlite:///./data/quiz.db
      - JWT_SECRET_KEY=miping-quiz-secret-key-2024
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: quiz-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
