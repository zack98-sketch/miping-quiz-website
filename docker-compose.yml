version: '3.8'

services:
  backend:
    build: ./backend
    container_name: quiz-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/quiz.db
      - JWT_SECRET_KEY=change-this-in-production
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: quiz-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
